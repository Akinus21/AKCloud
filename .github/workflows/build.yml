name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build project
        id: build
        run: |
          set -o pipefail && cargo build --release 2>&1 | tee build.log

      - name: Verify binary
        id: verify
        run: |
          BINARY=target/release/akcloud
          if [ ! -f "$BINARY" ]; then
            echo "Binary not found"
            exit 1
          fi
          SIZE=$(stat -c%s "$BINARY")
          # Require at least 10 KB to avoid cached tiny binaries
          if [ "$SIZE" -lt 10240 ]; then
            echo "Binary size too small: $SIZE bytes"
            exit 1
          fi
          echo "sha256=$(sha256sum "$BINARY" | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "size=$SIZE" >> $GITHUB_OUTPUT

      - name: Increment version, tag and push
        id: tag
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch --tags
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [[ ! "$latest" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            latest="v0.0.0"
          fi
          major=$(echo "$latest" | cut -d. -f1 | tr -d 'v')
          minor=$(echo "$latest" | cut -d. -f2)
          patch=$(echo "$latest" | cut -d. -f3)
          new_patch=$((patch + 1))
          new_tag="v${major}.${minor}.${new_patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

          # Update Cargo.toml version
          sed -i -E "s/^version = \".*\"/version = \"${major}.${minor}.${new_patch}\"/" Cargo.toml
          git add Cargo.toml
          git commit -m "chore: bump version to ${major}.${minor}.${new_patch}"
          git tag "$new_tag"
          git push origin "$new_tag"
          git push origin HEAD:main

      - name: Create GitHub Release with binary
        id: release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.new_tag }}"
          BINARY=target/release/akcloud
          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          gh release create "$TAG" --title "$TAG" --notes "Release $TAG" "$BINARY"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: akcloud-binary
          path: target/release/akcloud
          if-no-files-found: error

      - name: Webhook notification on success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          PAYLOAD=$(cat <<EOF
{
  "event": "build_success",
  "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
  "sha": "${{ github.sha }}",
  "commit_msg": "${{ github.event.head_commit.message }}",
  "ref": "${{ github.ref_name }}",
  "actor": "${{ github.actor }}"
}
EOF
)
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -X POST https://webhook.akinus21.com/webhook/akcloud-build \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: build_success" \
            -d "$PAYLOAD"

      - name: Webhook notification on failure
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          ERRORS=$(tail -n 200 build.log | sed ':a;N;$!ba;s/\n/\\n/g')
          PAYLOAD=$(cat <<EOF
{
  "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
  "sha": "${{ github.sha }}",
  "commit_msg": "${{ github.event.head_commit.message }}",
  "ref": "${{ github.ref_name }}",
  "actor": "${{ github.actor }}",
  "errors": "$ERRORS"
}
EOF
)
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -X POST https://webhook.akinus21.com/webhook/akcloud-build \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: build_failure" \
            -d "$PAYLOAD"