name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: none
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
        continue-on-error: true

      - name: Verify binary
        id: verify
        run: |
          if [ -f target/release/aktags-cloud ]; then
            echo "Binary found"
            echo "sha256=$(sha256sum target/release/aktags-cloud | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "Binary not found"
            exit 1
          fi

      - name: Get latest tag
        id: tag
        if: success()
        run: |
          git fetch --tags
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$latest" >> $GITHUB_OUTPUT

      - name: Create release tag and upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "new_tag=v1.0.1" >> $GITHUB_OUTPUT
          git tag v1.0.1
          git push origin v1.0.1
          gh release create v1.0.1 --title "v1.0.1" --notes "Release build"

      - name: Webhook notification
        if: success()
        env:
          PAYLOAD: |
            {
              "run_url": "https://github.com/Akinus21/AKCloud/actions/runs/${{ github.run_id }}",
              "sha": "${{ github.sha }}",
              "commit_msg": "${{ github.event.head_commit.message }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "status": "success"
            }
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          curl -X POST \
            -H "X-Hub-Signature-256: ${{ hashFiles('.github/workflows/build.yml') }}" \
            -H "X-GitHub-Event: build_success" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://webhook.akinus21.com/webhook/akcloud-build