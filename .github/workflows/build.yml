name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: none
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
        continue-on-error: true

      - name: Verify binary
        id: verify
        run: |
          if [ -f target/release/aktags-cloud ]; then
            echo "Binary found"
            echo "sha256=$(sha256sum target/release/aktags-cloud | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "Binary not found"
            exit 1
          fi

      - name: Create release tag and upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          latest=$(git describe --tags --abbrev=0 --always)
          echo "Latest tag: $latest"
          major=$(echo $latest | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          new_minor=$((minor + 1))
          new_tag="v${major}.${new_minor}.0"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          git tag $new_tag
          git push origin $new_tag
          gh release create $new_tag --title "$new_tag" --notes "Release build"

      - name: Webhook notification on success
        if: success()
        env:
          PAYLOAD: |
            {
              "run_url": "https://github.com/Akinus21/AKCloud/actions/runs/${{ github.run_id }}",
              "sha": "${{ github.sha }}",
              "commit_msg": "${{ github.event.head_commit.message }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "status": "success"
            }
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          curl -X POST \
            -H "X-Hub-Signature-256: ${{ hashFiles('.github/workflows/build.yml') }}" \
            -H "X-GitHub-Event: build_success" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://webhook.akinus21.com/webhook/akcloud-build

      - name: Webhook notification on failure
        if: failure()
        env:
          PAYLOAD: |
            {
              "run_url": "https://github.com/Akinus21/AKCloud/actions/runs/${{ github.run_id }}",
              "sha": "${{ github.sha }}",
              "commit_msg": "${{ github.event.head_commit.message }}",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "status": "failure"
            }
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          curl -X POST \
            -H "X-Hub-Signature-256: ${{ hashFiles('.github/workflows/build.yml') }}" \
            -H "X-GitHub-Event: build_failure" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://webhook.akinus21.com/webhook/akcloud-build