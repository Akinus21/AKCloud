name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: none
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
        continue-on-error: true

      - name: Verify binary
        id: verify
        run: |
          if [ -f target/release/aktags-cloud ]; then
            echo "Binary found"
            echo "sha256=$(sha256sum target/release/aktags-cloud | awk '{print $1}')" >> $GITHUB_OUTPUT
          else
            echo "Binary not found"
            exit 1
          fi

      - name: Create release tag and upload
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch --tags
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$latest" ] || ! [[ "$latest" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            latest="v0.0.0"
          fi
          major=$(echo $latest | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest | cut -d. -f2)
          patch=$(echo $latest | cut -d. -f3)
          while true; do
            new_tag="v${major}.${minor}.${patch}"
            if ! git rev-parse "$new_tag" >/dev/null 2>&1; then
              break
            fi
            patch=$((patch + 1))
          done
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          git tag $new_tag
          git push origin $new_tag
          gh release create $new_tag --title "$new_tag" --notes "Release build" ./target/release/aktags-cloud

      - name: Webhook notification on success
        if: success()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD="{\"event\":\"build_success\",\"run_url\":\"$RUN_URL\",\"sha\":\"$SHA\",\"commit_msg\":\"$COMMIT_MSG\",\"ref\":\"$REF\",\"actor\":\"$ACTOR\"}"
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -X POST https://webhook.akinus21.com/webhook/akcloud-build \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: build_success" \
            -d "$PAYLOAD"

      - name: Webhook notification on failure
        if: failure()
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD="{\"event\":\"build_failure\",\"run_url\":\"$RUN_URL\",\"sha\":\"$SHA\",\"commit_msg\":\"$COMMIT_MSG\",\"ref\":\"$REF\",\"actor\":\"$ACTOR\"}"
          SIGNATURE=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')
          curl -X POST https://webhook.akinus21.com/webhook/akcloud-build \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -H "X-GitHub-Event: build_failure" \
            -d "$PAYLOAD"