name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pages: none
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Build project
        run: cargo build --release

      - name: Run tests
        run: cargo test --all
        continue-on-error: true

      - name: Verify binary
        run: |
          ls -la target/release/akcloud || echo "Binary not found"

      - name: Increment tag
        if-no-files-found: error
        run: |
          git fetch --tags
          git describe --tags --abbrev=0
          echo "new_tag=vX.X.X" >> $GITHUB_OUTPUT

      - name: Create release tag and upload
        if-no-files-found: error
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag $GITHUB_OUTPUT_new_tag
          git push origin $GITHUB_OUTPUT_new_tag
          gh release create v$GITHUB_OUTPUT_new_tag --title "$GITHUB_OUTPUT_new_tag" --body "Release build" --binary target/release/akcloud
          sha256_checksum=$(sha256sum target/release/akcloud | awk '{print $1}')
          echo "sha256=$sha256_checksum" >> $GITHUB_OUTPUT
          echo "new_tag=$GITHUB_OUTPUT_new_tag" >> $GITHUB_OUTPUT

      - name: Webhook notification
        if-no-files-found: error
        env:
          PAYLOAD: |
            {
              "run_url": "https://github.com/Akinus21/AKCloud/actions/runs/${{ github.run_id }}",
              "sha": "${{ github.sha }}",
              "commit_msg": "...",
              "ref": "${{ github.ref_name }}",
              "actor": "${{ github.actor }}",
              "errors": "<last 200 lines of build.log as json string>"
            }
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_HMAC_SECRET }}
        run: |
          curl -X POST \
            -H "X-Hub-Signature-256: ${{ hashFiles('.github/workflows/build.yml') }}" \
            -H "X-GitHub-Event: build_success" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://webhook.akinus21.com/webhook/akcloud-build