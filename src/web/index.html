<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKCloud</title>
    <style>
        :root {
            --bg-primary: #0f172a;
            --bg-secondary: #1e293b;
            --bg-tertiary: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --border: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; display: flex; flex-direction: column; }
        header { background: var(--bg-secondary); border-bottom: 1px solid var(--border); padding: 0.75rem 1rem; display: flex; align-items: center; gap: 1rem; }
        .logo { font-weight: 700; font-size: 1.25rem; color: var(--accent); }
        .search { flex: 1; max-width: 500px; }
        .search input { width: 100%; padding: 0.5rem 1rem; border-radius: 0.5rem; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 0.9rem; }
        .search input:focus { outline: none; border-color: var(--accent); }
        .stats { display: flex; gap: 1rem; font-size: 0.85rem; color: var(--text-secondary); }
        main { flex: 1; display: flex; overflow: hidden; }
        aside { width: 200px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 1rem; overflow-y: auto; }
        .sidebar-section { margin-bottom: 1.5rem; }
        .sidebar-title { font-size: 0.75rem; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 0.5rem; letter-spacing: 0.05em; }
        .sidebar-item { padding: 0.4rem 0.5rem; border-radius: 0.25rem; cursor: pointer; display: flex; justify-content: space-between; }
        .sidebar-item:hover { background: var(--bg-tertiary); }
        .sidebar-item.active { background: var(--accent); }
        .count { background: var(--bg-tertiary); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.75rem; }
        .content { flex: 1; padding: 1rem; overflow-y: auto; }
        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
        .file-card { background: var(--bg-secondary); border-radius: 0.5rem; padding: 1rem; cursor: pointer; transition: transform 0.15s; }
        .file-card:hover { transform: translateY(-2px); }
        .file-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .file-name { font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-meta { font-size: 0.75rem; color: var(--text-secondary); margin-top: 0.25rem; }
        .file-tags { display: flex; gap: 0.25rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .tag { background: var(--accent); padding: 0.1rem 0.4rem; border-radius: 0.25rem; font-size: 0.7rem; }
        .empty { text-align: center; padding: 3rem; color: var(--text-secondary); }
        .loading { display: flex; align-items: center; justify-content: center; height: 100%; }
        .spinner { width: 2rem; height: 2rem; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">AKCloud</div>
        <div class="search"><input type="text" id="search" placeholder="Search files..."></div>
        <div class="stats" id="stats"></div>
    </header>
    <main>
        <aside>
            <div class="sidebar-section">
                <div class="sidebar-title">Library</div>
                <div class="sidebar-item active" data-filter="">All Files</div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-title">Tags</div>
                <div id="tags-list"></div>
            </div>
        </aside>
        <div class="content"><div class="file-grid" id="files-grid"><div class="loading"><div class="spinner"></div></div></div></div>
    </main>
    <script>
        const state = { files: [], tags: [], searchQuery: '' };
        const fileIcons = { image: '🖼️', video: '🎬', audio: '🎵', document: '📄', code: '💻', archive: '📦', web: '🌐' };
        function getIcon(type) { return fileIcons[type] || '📄'; }
        function formatSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB'; if (bytes < 1024*1024*1024) return (bytes/(1024*1024)).toFixed(1) + ' MB'; return (bytes/(1024*1024*1024)).toFixed(1) + ' GB'; }
        function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(); }
        async function loadFiles() {
            const grid = document.getElementById('files-grid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            try {
                let url = state.searchQuery ? `/api/files/search?q=${encodeURIComponent(state.searchQuery)}&limit=100` : '/api/files?limit=100';
                const res = await fetch(url);
                const data = await res.json();
                state.files = data.files || data;
                renderFiles();
            } catch (e) { grid.innerHTML = '<div class="empty">Error: ' + e + '</div>'; }
        }
        async function loadTags() {
            try { const res = await fetch('/api/tags'); state.tags = await res.json(); renderTags(); } catch (e) { console.error(e); }
        }
        async function loadStats() {
            try { const res = await fetch('/api/stats'); const stats = await res.json(); document.getElementById('stats').innerHTML = '<span>' + stats.total_files + ' files</span><span>' + formatSize(stats.total_size) + '</span>'; } catch (e) { console.error(e); }
        }
        function renderFiles() {
            const grid = document.getElementById('files-grid');
            if (state.files.length === 0) { grid.innerHTML = '<div class="empty">No files</div>'; return; }
            grid.innerHTML = state.files.map(file => '<div class="file-card"><div class="file-icon">' + getIcon(file.name.split('.').pop()) + '</div><div class="file-name">' + file.name + '</div><div class="file-meta">' + formatSize(file.size) + ' · ' + formatDate(file.updated_at) + '</div></div>').join('');
        }
        function renderTags() { document.getElementById('tags-list').innerHTML = state.tags.map(tag => '<div class="sidebar-item"><span>' + tag.name + '</span><span class="count">' + tag.count + '</span></div>').join(''); }
        document.getElementById('search').addEventListener('input', e => { state.searchQuery = e.target.value; clearTimeout(state.searchTimeout); state.searchTimeout = setTimeout(loadFiles, 300); });
        state.searchTimeout = null;
        loadFiles(); loadTags(); loadStats();
    </script>
</body>
</html>
